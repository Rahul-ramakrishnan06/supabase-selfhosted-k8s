# App-of-apps root. Sync this ONE Application and ArgoCD manages everything
# else: the child Applications in gitops/apps (supabase, myapp, platform-secrets).
#
#   kubectl apply -f gitops/bootstrap/root-app.yml
#
# After that, all further changes flow through git -> ArgoCD auto-sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Rahul-ramakrishnan06/supabase-selfhosted-k8s.git
    targetRevision: main
    path: gitops/apps
    directory:
      recurse: false      # gitops/apps holds only child Application manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
