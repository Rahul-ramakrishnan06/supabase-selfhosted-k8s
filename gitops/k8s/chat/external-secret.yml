# Chat backend credentials, sourced from OpenBao via ESO (never hard-coded).
# The backend needs both keys:
#   anonKey    -> used for auth (signup/login) and per-user RLS-scoped queries
#   serviceKey -> used ONLY for the server-side Realtime subscription
# Both stay server-side; the browser never receives them.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chat-supabase
  namespace: chat
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: chat-supabase
    creationPolicy: Owner
  data:
    - secretKey: SUPABASE_ANON_KEY
      remoteRef: { key: supabase, property: anonKey }
    - secretKey: SUPABASE_SERVICE_KEY
      remoteRef: { key: supabase, property: serviceKey }
