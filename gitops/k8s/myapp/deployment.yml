apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels: { app: myapp }
  template:
    metadata:
      labels: { app: myapp }
    spec:
      containers:
        - name: myapp
          image: myapp:local
          imagePullPolicy: IfNotPresent   # image pre-loaded into kind nodes
          ports:
            - containerPort: 8080
          env:
            # Kong gateway = the Supabase entrypoint, reachable in-cluster.
            - name: SUPABASE_URL
              value: "http://supabase-supabase-kong.supabase.svc.cluster.local:8000"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: myapp-supabase
                  key: SUPABASE_ANON_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: myapp
spec:
  selector: { app: myapp }
  ports:
    - port: 80
      targetPort: 8080
