# Give the app its Supabase credentials from OpenBao (never hard-coded).
# Only the anon key is exposed to the app; service_role stays server-side.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: myapp-supabase
  namespace: myapp
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: myapp-supabase
    creationPolicy: Owner
  data:
    - secretKey: SUPABASE_ANON_KEY
      remoteRef: { key: supabase, property: anonKey }
