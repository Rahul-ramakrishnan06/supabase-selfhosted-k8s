# Materializes secret/supabase (OpenBao) into a native k8s Secret named
# "supabase-secrets" in the supabase namespace. The chart references it via
# secretRef (see gitops/values/supabase-values.yaml). Single source of truth:
# the chart does NOT generate its own -- avoids Postgres<->services mismatch.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supabase-secrets
  namespace: supabase
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: supabase-secrets
    creationPolicy: Owner
  data:
    # k8s secret key   <-  OpenBao property (path secret/supabase)
    - secretKey: anonKey
      remoteRef: { key: supabase, property: anonKey }
    - secretKey: serviceKey
      remoteRef: { key: supabase, property: serviceKey }
    - secretKey: secret          # jwt secret
      remoteRef: { key: supabase, property: jwtSecret }
    - secretKey: password        # db password
      remoteRef: { key: supabase, property: dbPassword }
    - secretKey: database
      remoteRef: { key: supabase, property: dbDatabase }
    - secretKey: username        # studio dashboard user
      remoteRef: { key: supabase, property: dashboardUsername }
    - secretKey: dashboardPassword
      remoteRef: { key: supabase, property: dashboardPassword }
    - secretKey: openAiApiKey     # studio wires OPENAI_API_KEY unconditionally
      remoteRef: { key: supabase, property: openAiApiKey }
