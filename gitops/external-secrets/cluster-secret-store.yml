# ESO -> OpenBao. OpenBao speaks the Vault API, so the vault provider works.
# token auth (dev root token) lives in the supabase/openbao-token secret that
# seed-openbao.sh created. DC: swap to kubernetes/approle auth + a scoped policy.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: openbao-token
          key: token
          namespace: supabase
