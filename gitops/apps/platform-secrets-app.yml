# Manages the OpenBao->ESO wiring (ClusterSecretStore + ExternalSecret) via GitOps.
# ClusterSecretStore is cluster-scoped; the ExternalSecret carries its own
# namespace (supabase), so destination.namespace is just a default.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Rahul-ramakrishnan06/supabase-selfhosted-k8s.git
    targetRevision: main
    path: gitops/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: supabase
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
